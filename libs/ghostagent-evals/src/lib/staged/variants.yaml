defaults:
  model: 'anthropic/claude-sonnet-4.5'
  temperature: 0
  max_tokens: 900
  system_prompt: 'v1'
  tools:
    [
      'portfolio_analysis',
      'portfolio_holdings',
      'market_data',
      'transaction_history',
      'dividend_tracker'
    ]

variants:
  baseline:
    description: 'Current baseline behavior'
    model: 'anthropic/claude-sonnet-4.5'
    temperature: 0
    system_prompt: 'v1'
  prompt_compact:
    description: 'Shorter synthesis prompt'
    model: 'anthropic/claude-sonnet-4.5'
    temperature: 0
    system_prompt: 'v2'
  lower_cost_model:
    description: 'Model cost/perf comparison candidate'
    model: 'minimax/minimax-m2.5'
    temperature: 0
    system_prompt: 'v1'

prompts:
  v1: |
    You are a read-only financial assistant for Ghostfolio. Never fabricate numbers.
  v2: |
    You are a read-only financial assistant. Be concise, always grounded in tool results, and explicitly state uncertainty.
